groups:
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~".*-service"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "服务 {{ $labels.instance }} 已宕机"
          description: "{{ $labels.job }} 在 {{ $labels.instance }} 上已失联超过 1 分钟"
          runbook_url: "https://wiki.internal/runbooks/service-down"

      - alert: HealthCheckFailing
        expr: health_check_status{} == 0
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "健康检查失败: {{ $labels.target }}"
          description: "{{ $labels.target }} 健康检查连续失败超过 2 分钟"

  - name: error_rate
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.05
        for: 3m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "{{ $labels.service }} 错误率过高"
          description: "{{ $labels.service }} 5xx 错误率超过 5%，当前 {{ $value | humanizePercentage }}"

      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.15
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.service }} 错误率严重过高"
          description: "{{ $labels.service }} 5xx 错误率超过 15%"

  - name: latency
    interval: 30s
    rules:
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "{{ $labels.service }} P95 延迟过高"
          description: "{{ $labels.service }} P95 延迟超过 1 秒，当前 {{ $value | humanizeDuration }}"

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 3.0
        for: 3m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.service }} P99 延迟严重过高"
          description: "P99 延迟超过 3 秒"

  - name: resources
    interval: 60s
    rules:
      - alert: HighMemoryUsage
        expr: |
          container_memory_usage_bytes{name=~".+-service"}
          /
          container_spec_memory_limit_bytes{name=~".+-service"}
          > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "{{ $labels.name }} 内存使用率过高"
          description: "内存使用超过 85%，当前 {{ $value | humanizePercentage }}"

      - alert: HighCPUUsage
        expr: |
          rate(container_cpu_usage_seconds_total{name=~".+-service"}[5m])
          /
          container_spec_cpu_quota{name=~".+-service"}
          * 100000 > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.name }} CPU 使用率过高"

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
          /
          node_filesystem_size_bytes{mountpoint="/"})
          < 0.15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足"
          description: "根分区剩余空间低于 15%"
