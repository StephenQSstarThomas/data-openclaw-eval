global:
  resolve_timeout: 5m
  smtp_from: "alerts@microplatform.io"
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_auth_username: "alerts@microplatform.io"
  smtp_auth_password_file: "/run/secrets/smtp_password"
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  receiver: "default"
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "pagerduty-critical"
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "slack-warning"
      repeat_interval: 4h

receivers:
  - name: "default"
    slack_configs:
      - api_url_file: "/run/secrets/slack_webhook"
        channel: "#alerts-general"
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: "pagerduty-critical"
    pagerduty_configs:
      - routing_key_file: "/run/secrets/pagerduty_key"
        severity: critical
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
    slack_configs:
      - api_url_file: "/run/secrets/slack_webhook"
        channel: "#alerts-critical"
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: ':rotating_light: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: "slack-warning"
    slack_configs:
      - api_url_file: "/run/secrets/slack_webhook"
        channel: "#alerts-warning"
        color: 'warning'
        title: ':warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]
